version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - UPSTASH_REDIS_REST_URL=http://redis-rest:8079
      - UPSTASH_REDIS_REST_TOKEN=local_dev_token
    depends_on:
      redis:
        condition: service_healthy

  # Serverless Redis HTTP bridge (Upstash-compatible REST API for local Redis)
  redis-rest:
    image: hiett/serverless-redis-http:latest
    ports:
      - "8079:80"
    environment:
      SRH_MODE: env
      SRH_TOKEN: local_dev_token
      SRH_CONNECTION_STRING: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
